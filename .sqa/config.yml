config:
  credentials: []
  project_repos:
    github.com/EOSC-synergy/sqaaas-tooling:
      branch: feature/pynblint
      repo: https://github.com/EOSC-synergy/sqaaas-tooling
    github.com/PalomoIFCA/testerpyo:
      branch: main
      repo: https://github.com/PalomoIFCA/testerpyo
environment:
  JPL_DOCKERFORCEBUILD: enabled
  JPL_KEEPGOING: enabled
sqa_criteria:
  QC.Acc:
    repos:
      github.com/PalomoIFCA/testerpyo git:
        commands:
        - /usr/bin/env sh .sqa/script.smelly-indigo-russel.sh
        container: qc.acc_muggy-vermilion-fish
  QC.Doc:
    repos:
      github.com/PalomoIFCA/testerpyo find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.lumpy-saffron-lemming.sh
        container: qc.doc_slimy-amaranth-flounder
      github.com/PalomoIFCA/testerpyo git:
        commands:
        - /usr/bin/env sh .sqa/script.bumpy-chartreuse-squid.sh
        container: qc.doc_gimpy-amaranth-chameleon
      github.com/PalomoIFCA/testerpyo markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.chummy-thistle-falcon.sh
        container: qc.doc_homely-celadon-ragdoll
  QC.Lic:
    repos:
      github.com/PalomoIFCA/testerpyo licensee:
        commands:
        - /usr/bin/env sh .sqa/script.breezy-bistre-ocelot.sh
        container: qc.lic_breezy-olivine-bandicoot
  QC.Sty:
    repos:
      github.com/PalomoIFCA/testerpyo jsonlint:
        commands:
        - /usr/bin/env sh .sqa/script.smelly-thistle-blue.sh
        container: qc.sty_shaky-chartreuse-uakari
      github.com/PalomoIFCA/testerpyo pynblint.py:
        commands:
        - /usr/bin/env sh .sqa/script.clammy-goldenrod-liger.sh
        container: qc.sty_jumpy-sepia-russel
  QC.Ver:
    repos:
      github.com/PalomoIFCA/testerpyo get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.fuzzy-salmon-tarantula.sh
        container: qc.ver_zippy-buff-warthog
timeout: 5400
