config:
  credentials: []
  project_repos:
    github.com/EOSC-synergy/sqaaas-tooling:
      branch: feature/pynblint
      repo: https://github.com/EOSC-synergy/sqaaas-tooling
    github.com/PalomoIFCA/testerpyo:
      branch: main
      repo: https://github.com/PalomoIFCA/testerpyo
environment:
  JPL_DOCKERFORCEBUILD: enabled
  JPL_KEEPGOING: enabled
sqa_criteria:
  QC.Acc:
    repos:
      github.com/PalomoIFCA/testerpyo git:
        commands:
        - /usr/bin/env sh .sqa/script.freaky-corn-chinchilla.sh
        container: qc.acc_seedy-sangria-lizard
  QC.Doc:
    repos:
      github.com/PalomoIFCA/testerpyo find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.randy-smalt-flamingo.sh
        container: qc.doc_lanky-maroon-badger
      github.com/PalomoIFCA/testerpyo git:
        commands:
        - /usr/bin/env sh .sqa/script.dorky-plum-olm.sh
        container: qc.doc_goopy-amber-dogfish
      github.com/PalomoIFCA/testerpyo markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.sunny-myrtle-hamster.sh
        container: qc.doc_lumpy-saffron-beetle
  QC.Lic:
    repos:
      github.com/PalomoIFCA/testerpyo licensee:
        commands:
        - /usr/bin/env sh .sqa/script.tasty-cinnabar-centipede.sh
        container: qc.lic_wimpy-pear-booby
  QC.Sty:
    repos:
      github.com/PalomoIFCA/testerpyo jsonlint:
        commands:
        - /usr/bin/env sh .sqa/script.sleazy-apricot-collie.sh
        container: qc.sty_sloppy-rose-wasp
      github.com/PalomoIFCA/testerpyo pynblint.py:
        commands:
        - /usr/bin/env sh .sqa/script.squeaky-yellow-squid.sh
        container: qc.sty_trippy-chestnut-oyster
  QC.Ver:
    repos:
      github.com/PalomoIFCA/testerpyo get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.skinny-denim-fowl.sh
        container: qc.ver_nippy-cinnabar-dragonfly
timeout: 5400
