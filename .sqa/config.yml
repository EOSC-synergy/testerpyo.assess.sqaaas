config:
  credentials: []
  project_repos:
    github.com/EOSC-synergy/sqaaas-tooling:
      branch: feature/pynblint
      repo: https://github.com/EOSC-synergy/sqaaas-tooling
    github.com/PalomoIFCA/testerpyo:
      branch: main
      repo: https://github.com/PalomoIFCA/testerpyo
environment:
  JPL_DOCKERFORCEBUILD: enabled
  JPL_KEEPGOING: enabled
sqa_criteria:
  QC.Acc:
    repos:
      github.com/PalomoIFCA/testerpyo git:
        commands:
        - /usr/bin/env sh .sqa/script.scanty-cream-mongrel.sh
        container: qc.acc_scaly-bronze-hyena
  QC.Doc:
    repos:
      github.com/PalomoIFCA/testerpyo find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.craggy-ultramarine-saola.sh
        container: qc.doc_shaggy-tomato-dunker
      github.com/PalomoIFCA/testerpyo git:
        commands:
        - /usr/bin/env sh .sqa/script.cheeky-mustard-terrier.sh
        container: qc.doc_wiggy-crimson-dalmatian
      github.com/PalomoIFCA/testerpyo markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.wiggy-gamboge-owl.sh
        container: qc.doc_woozy-fuchsia-newfoundland
  QC.Lic:
    repos:
      github.com/PalomoIFCA/testerpyo licensee:
        commands:
        - /usr/bin/env sh .sqa/script.slimy-lilac-dodo.sh
        container: qc.lic_jumpy-flax-bandicoot
  QC.Sty:
    repos:
      github.com/PalomoIFCA/testerpyo jsonlint:
        commands:
        - /usr/bin/env sh .sqa/script.pokey-bronze-moose.sh
        container: qc.sty_cranky-olivine-stingray
      github.com/PalomoIFCA/testerpyo pynblint.py:
        commands:
        - /usr/bin/env sh .sqa/script.pokey-jade-akita.sh
        container: qc.sty_bluesy-tomato-eagle
  QC.Ver:
    repos:
      github.com/PalomoIFCA/testerpyo get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.homey-apricot-mouse.sh
        container: qc.ver_blurry-indigo-ibis
timeout: 5400
