config:
  credentials: []
  project_repos:
    github.com/EOSC-synergy/sqaaas-tooling:
      branch: feature/pynblint_fix
      repo: https://github.com/EOSC-synergy/sqaaas-tooling
    github.com/PalomoIFCA/testerpyo:
      branch: main
      repo: https://github.com/PalomoIFCA/testerpyo
environment:
  JPL_DOCKERFORCEBUILD: enabled
  JPL_KEEPGOING: enabled
sqa_criteria:
  QC.Acc:
    repos:
      github.com/PalomoIFCA/testerpyo git:
        commands:
        - /usr/bin/env sh .sqa/script.strawberry_savvy_seahorse.sh
        container: qc.acc_onyx_feisty_jellyfish
  QC.Doc:
    repos:
      github.com/PalomoIFCA/testerpyo find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.gamboge_smart_walrus.sh
        container: qc.doc_steel_sad_mandrill
      github.com/PalomoIFCA/testerpyo git:
        commands:
        - /usr/bin/env sh .sqa/script.rose_feisty_llama.sh
        container: qc.doc_cobalt_outgoing_elephant
      github.com/PalomoIFCA/testerpyo markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.lime_pensive_boa.sh
        container: qc.doc_magenta_authentic_snail
  QC.Lic:
    repos:
      github.com/PalomoIFCA/testerpyo licensee:
        commands:
        - /usr/bin/env sh .sqa/script.crimson_bubbly_manta.sh
        container: qc.lic_rust_perky_kangaroo
  QC.Sty:
    repos:
      github.com/PalomoIFCA/testerpyo jsonlint:
        commands:
        - /usr/bin/env sh .sqa/script.navy_understanding_starfish.sh
        container: qc.sty_cyan_clever_kookaburra
      github.com/PalomoIFCA/testerpyo pynblint.py:
        commands:
        - /usr/bin/env sh .sqa/script.periwinkle_restless_eel.sh
        container: qc.sty_mango_dramatic_quail
  QC.Ver:
    repos:
      github.com/PalomoIFCA/testerpyo get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.pine_confused_mongoose.sh
        container: qc.ver_goldenrod_shrewd_rattlesnake
timeout: 5400
