config:
  credentials: []
  project_repos:
    github.com/EOSC-synergy/sqaaas-tooling:
      branch: feature/pynblint
      repo: https://github.com/EOSC-synergy/sqaaas-tooling
    github.com/PalomoIFCA/testerpyo:
      branch: main
      repo: https://github.com/PalomoIFCA/testerpyo
environment:
  JPL_DOCKERFORCEBUILD: enabled
  JPL_KEEPGOING: enabled
sqa_criteria:
  QC.Acc:
    repos:
      github.com/PalomoIFCA/testerpyo git:
        commands:
        - /usr/bin/env sh .sqa/script.gamy-orange-weasel.sh
        container: qc.acc_smelly-magenta-albatross
  QC.Doc:
    repos:
      github.com/PalomoIFCA/testerpyo find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.tasty-sangria-barb.sh
        container: qc.doc_woolly-copper-gopher
      github.com/PalomoIFCA/testerpyo git:
        commands:
        - /usr/bin/env sh .sqa/script.gloppy-green-maltese.sh
        container: qc.doc_pretty-razzmatazz-coati
      github.com/PalomoIFCA/testerpyo markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.trippy-persimmon-ibis.sh
        container: qc.doc_pasty-violet-shark
  QC.Lic:
    repos:
      github.com/PalomoIFCA/testerpyo licensee:
        commands:
        - /usr/bin/env sh .sqa/script.skanky-olive-centipede.sh
        container: qc.lic_silly-cerise-lemur
  QC.Sty:
    repos:
      github.com/PalomoIFCA/testerpyo jsonlint:
        commands:
        - /usr/bin/env sh .sqa/script.foggy-cerulean-schnauzer.sh
        container: qc.sty_scummy-copper-hound
      github.com/PalomoIFCA/testerpyo pynblint.py:
        commands:
        - /usr/bin/env sh .sqa/script.cranky-brown-cuttlefish.sh
        container: qc.sty_skimpy-smalt-mammoth
  QC.Ver:
    repos:
      github.com/PalomoIFCA/testerpyo get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.foggy-maroon-mole.sh
        container: qc.ver_droopy-dandelion-caterpillar
timeout: 5400
