config:
  credentials: []
  project_repos:
    github.com/EOSC-synergy/sqaaas-tooling:
      branch: feature/pynblint
      repo: https://github.com/EOSC-synergy/sqaaas-tooling
    github.com/PalomoIFCA/testerpyo:
      branch: main
      repo: https://github.com/PalomoIFCA/testerpyo
environment:
  JPL_DOCKERFORCEBUILD: enabled
  JPL_KEEPGOING: enabled
sqa_criteria:
  QC.Acc:
    repos:
      github.com/PalomoIFCA/testerpyo git:
        commands:
        - /usr/bin/env sh .sqa/script.snazzy-puce-hare.sh
        container: qc.acc_hazy-lavender-stingray
  QC.Doc:
    repos:
      github.com/PalomoIFCA/testerpyo find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.smelly-firebrick-macaw.sh
        container: qc.doc_crabby-rose-serval
      github.com/PalomoIFCA/testerpyo git:
        commands:
        - /usr/bin/env sh .sqa/script.droopy-tan-chimpanzee.sh
        container: qc.doc_thirsty-sangria-vulture
      github.com/PalomoIFCA/testerpyo markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.snappy-harlequin-ferret.sh
        container: qc.doc_zippy-scarlet-chipmunk
  QC.Lic:
    repos:
      github.com/PalomoIFCA/testerpyo licensee:
        commands:
        - /usr/bin/env sh .sqa/script.thirsty-lilac-emu.sh
        container: qc.lic_skinny-burgundy-beetle
  QC.Sty:
    repos:
      github.com/PalomoIFCA/testerpyo jsonlint:
        commands:
        - /usr/bin/env sh .sqa/script.hilly-teal-caterpillar.sh
        container: qc.sty_snoopy-khaki-maltese
      github.com/PalomoIFCA/testerpyo pynblint.py:
        commands:
        - /usr/bin/env sh .sqa/script.fuzzy-amber-mayfly.sh
        container: qc.sty_shabby-amber-anteater
  QC.Ver:
    repos:
      github.com/PalomoIFCA/testerpyo get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.queasy-jade-frog.sh
        container: qc.ver_lousy-lemon-toucan
timeout: 5400
