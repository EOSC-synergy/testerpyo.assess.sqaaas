config:
  credentials: []
  project_repos:
    github.com/EOSC-synergy/sqaaas-tooling:
      branch: feature/pynblint
      repo: https://github.com/EOSC-synergy/sqaaas-tooling
    github.com/PalomoIFCA/testerpyo:
      branch: main
      repo: https://github.com/PalomoIFCA/testerpyo
environment:
  JPL_DOCKERFORCEBUILD: enabled
  JPL_KEEPGOING: enabled
sqa_criteria:
  QC.Acc:
    repos:
      github.com/PalomoIFCA/testerpyo git:
        commands:
        - /usr/bin/env sh .sqa/script.gamy-orange-clam.sh
        container: qc.acc_beady-corn-mayfly
  QC.Doc:
    repos:
      github.com/PalomoIFCA/testerpyo find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.homey-blue-baboon.sh
        container: qc.doc_goopy-amber-gecko
      github.com/PalomoIFCA/testerpyo git:
        commands:
        - /usr/bin/env sh .sqa/script.snippy-rose-angora.sh
        container: qc.doc_stealthy-mustard-balinese
      github.com/PalomoIFCA/testerpyo markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.freaky-amber-chimpanzee.sh
        container: qc.doc_gloppy-linen-bordeaux
  QC.Lic:
    repos:
      github.com/PalomoIFCA/testerpyo licensee:
        commands:
        - /usr/bin/env sh .sqa/script.thirsty-brass-caracal.sh
        container: qc.lic_sloppy-pink-fox
  QC.Sty:
    repos:
      github.com/PalomoIFCA/testerpyo jsonlint:
        commands:
        - /usr/bin/env sh .sqa/script.squeaky-thistle-gibbon.sh
        container: qc.sty_clammy-razzmatazz-loon
      github.com/PalomoIFCA/testerpyo pynblint.py:
        commands:
        - /usr/bin/env sh .sqa/script.skimpy-alizarin-rhinoceros.sh
        container: qc.sty_fuzzy-brown-affenpinscher
  QC.Ver:
    repos:
      github.com/PalomoIFCA/testerpyo get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.frumpy-cardinal-ibis.sh
        container: qc.ver_cheeky-olivine-kiwi
timeout: 5400
