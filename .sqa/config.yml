config:
  credentials: []
  project_repos:
    github.com/EOSC-synergy/sqaaas-tooling:
      branch: feature/Ophidia
      repo: https://github.com/EOSC-synergy/sqaaas-tooling
    github.com/PalomoIFCA/testerpyo:
      branch: main
      repo: https://github.com/PalomoIFCA/testerpyo
environment:
  JPL_DOCKERFORCEBUILD: enabled
  JPL_KEEPGOING: enabled
sqa_criteria:
  QC.Acc:
    repos:
      github.com/PalomoIFCA/testerpyo git:
        commands:
        - /usr/bin/env sh .sqa/script.randy-charcoal-llama.sh
        container: qc.acc_breezy-eggplant-lemming
  QC.Doc:
    repos:
      github.com/PalomoIFCA/testerpyo find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.snazzy-heliotrope-mist.sh
        container: qc.doc_scanty-gamboge-gorilla
      github.com/PalomoIFCA/testerpyo git:
        commands:
        - /usr/bin/env sh .sqa/script.snazzy-viridian-bison.sh
        container: qc.doc_jumpy-razzmatazz-quoll
      github.com/PalomoIFCA/testerpyo markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.scummy-apricot-camel.sh
        container: qc.doc_gummy-xanthic-havanese
  QC.Lic:
    repos:
      github.com/PalomoIFCA/testerpyo licensee:
        commands:
        - /usr/bin/env sh .sqa/script.pasty-cerulean-mammoth.sh
        container: qc.lic_shaggy-cerise-kudu
  QC.Sty:
    repos:
      github.com/PalomoIFCA/testerpyo jsonlint:
        commands:
        - /usr/bin/env sh .sqa/script.wheezy-dandelion-zebra.sh
        container: qc.sty_shaggy-sapphire-reindeer
  QC.Ver:
    repos:
      github.com/PalomoIFCA/testerpyo get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.fuzzy-persimmon-coral.sh
        container: qc.ver_stealthy-champagne-caiman
timeout: 5400
