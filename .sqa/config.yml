config:
  credentials: []
  project_repos:
    github.com/EOSC-synergy/sqaaas-tooling:
      branch: feature/pynblint
      repo: https://github.com/EOSC-synergy/sqaaas-tooling
    github.com/PalomoIFCA/testerpyo:
      branch: main
      repo: https://github.com/PalomoIFCA/testerpyo
environment:
  JPL_DOCKERFORCEBUILD: enabled
  JPL_KEEPGOING: enabled
sqa_criteria:
  QC.Acc:
    repos:
      github.com/PalomoIFCA/testerpyo git:
        commands:
        - /usr/bin/env sh .sqa/script.hasty-aquamarine-mastiff.sh
        container: qc.acc_paltry-vermilion-dane
  QC.Doc:
    repos:
      github.com/PalomoIFCA/testerpyo find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.paltry-cardinal-meerkat.sh
        container: qc.doc_zippy-goldenrod-rat
      github.com/PalomoIFCA/testerpyo git:
        commands:
        - /usr/bin/env sh .sqa/script.lanky-periwinkle-coati.sh
        container: qc.doc_flimsy-lavender-gharial
      github.com/PalomoIFCA/testerpyo markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.clammy-sangria-shrimp.sh
        container: qc.doc_wiggy-black-dragonfly
  QC.Lic:
    repos:
      github.com/PalomoIFCA/testerpyo licensee:
        commands:
        - /usr/bin/env sh .sqa/script.lousy-eggplant-oyster.sh
        container: qc.lic_craggy-gold-clam
  QC.Sty:
    repos:
      github.com/PalomoIFCA/testerpyo jsonlint:
        commands:
        - /usr/bin/env sh .sqa/script.bumpy-tan-husky.sh
        container: qc.sty_homely-grey-squirrel
      github.com/PalomoIFCA/testerpyo pynblint.py:
        commands:
        - /usr/bin/env sh .sqa/script.pokey-burgundy-mongrel.sh
        container: qc.sty_muzzy-cornflower-ant
  QC.Ver:
    repos:
      github.com/PalomoIFCA/testerpyo get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.flaky-pink-mastiff.sh
        container: qc.ver_pretty-cinnabar-indri
timeout: 5400
