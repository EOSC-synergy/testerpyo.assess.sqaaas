config:
  credentials: []
  project_repos:
    github.com/EOSC-synergy/sqaaas-tooling:
      branch: feature/pynblint
      repo: https://github.com/EOSC-synergy/sqaaas-tooling
    github.com/PalomoIFCA/testerpyo:
      branch: main
      repo: https://github.com/PalomoIFCA/testerpyo
environment:
  JPL_DOCKERFORCEBUILD: enabled
  JPL_KEEPGOING: enabled
sqa_criteria:
  QC.Acc:
    repos:
      github.com/PalomoIFCA/testerpyo git:
        commands:
        - /usr/bin/env sh .sqa/script.wiggy-chartreuse-spitz.sh
        container: qc.acc_stuffy-peach-spitz
  QC.Doc:
    repos:
      github.com/PalomoIFCA/testerpyo find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.gummy-khaki-warthog.sh
        container: qc.doc_cranky-cinnamon-centipede
      github.com/PalomoIFCA/testerpyo git:
        commands:
        - /usr/bin/env sh .sqa/script.surly-chocolate-fowl.sh
        container: qc.doc_flimsy-crimson-hare
      github.com/PalomoIFCA/testerpyo markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.hilly-taupe-harrier.sh
        container: qc.doc_randy-asparagus-capybara
  QC.Lic:
    repos:
      github.com/PalomoIFCA/testerpyo licensee:
        commands:
        - /usr/bin/env sh .sqa/script.messy-cardinal-mau.sh
        container: qc.lic_sickly-cornflower-baboon
  QC.Sty:
    repos:
      github.com/PalomoIFCA/testerpyo pynblint.py:
        commands:
        - /usr/bin/env sh .sqa/script.whiny-dandelion-avocet.sh
        container: qc.sty_lumpy-auburn-tamarin
  QC.Ver:
    repos:
      github.com/PalomoIFCA/testerpyo get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.wiggy-xanthic-bloodhound.sh
        container: qc.ver_droopy-salmon-dalmatian
timeout: 5400
