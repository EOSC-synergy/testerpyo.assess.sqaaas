config:
  credentials: []
  project_repos:
    github.com/EOSC-synergy/sqaaas-tooling:
      branch: feature/pynblint
      repo: https://github.com/EOSC-synergy/sqaaas-tooling
    github.com/PalomoIFCA/testerpyo:
      branch: main
      repo: https://github.com/PalomoIFCA/testerpyo
environment:
  JPL_DOCKERFORCEBUILD: enabled
  JPL_KEEPGOING: enabled
sqa_criteria:
  QC.Acc:
    repos:
      github.com/PalomoIFCA/testerpyo git:
        commands:
        - /usr/bin/env sh .sqa/script.slimy-ruby-hare.sh
        container: qc.acc_lumpy-harlequin-russel
  QC.Doc:
    repos:
      github.com/PalomoIFCA/testerpyo find_doc_files.py:
        commands:
        - /usr/bin/env sh .sqa/script.chewy-gold-mouse.sh
        container: qc.doc_gamy-firebrick-coati
      github.com/PalomoIFCA/testerpyo git:
        commands:
        - /usr/bin/env sh .sqa/script.thirsty-platinum-centipede.sh
        container: qc.doc_cranky-mauve-tarsier
      github.com/PalomoIFCA/testerpyo markdownlint:
        commands:
        - /usr/bin/env sh .sqa/script.leaky-purple-duck.sh
        container: qc.doc_lousy-champagne-ostrich
  QC.Lic:
    repos:
      github.com/PalomoIFCA/testerpyo licensee:
        commands:
        - /usr/bin/env sh .sqa/script.bluesy-cerise-eel.sh
        container: qc.lic_squeaky-cornflower-insect
  QC.Sty:
    repos:
      github.com/PalomoIFCA/testerpyo jsonlint:
        commands:
        - /usr/bin/env sh .sqa/script.baggy-lemon-mole.sh
        container: qc.sty_jumpy-malachite-bat
      github.com/PalomoIFCA/testerpyo pynblint.py:
        commands:
        - /usr/bin/env sh .sqa/script.lousy-crimson-mau.sh
        container: qc.sty_pokey-persimmon-clam
  QC.Ver:
    repos:
      github.com/PalomoIFCA/testerpyo get_git_tags.py:
        commands:
        - /usr/bin/env sh .sqa/script.messy-emerald-tapir.sh
        container: qc.ver_scaly-tangerine-sloth
timeout: 5400
